# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Copy Artifacts
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GURUKULAMS_HOST }}
        username: ${{ secrets.GURUKULAMS_USER }}
        key: ${{ secrets.GURUKULAMS_KEY }}
        target: ${{ secrets.GURUKULAMS_ENGINE_DIR }}
        source: "target/*.jar"
        strip_components: 1

    - name: Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GURUKULAMS_HOST }}
        username: ${{ secrets.GURUKULAMS_USER }}
        key: ${{ secrets.GURUKULAMS_KEY }}
        script:
          cd ${{ secrets.GURUKULAMS_ENGINE_DIR }} && pkill -9 -f engine || true && nohup /home/opc/platform/jre/bin/java -jar engine-*.jar &